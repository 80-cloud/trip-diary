default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("MYSQL_PORT") { 3316 } %>
  username: <%= ENV.fetch("MYSQL_USER") { "root" } %>
  password: <%= ENV.fetch("MYSQL_PASSWORD") { "" } %>

development:
  <<: *default
  database: <%= ENV.fetch("MYSQL_DATABASE") { "trip_diary_dev" } %>

test:
  <<: *default
  database: trip_diary_test

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("MYSQL_DATABASE") { "trip_diary_prod" } %>
    username: <%= ENV.fetch("MYSQL_USER") { "trip" } %>
    password: <%= ENV["MYSQL_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: <%= ENV.fetch("MYSQL_DATABASE_CACHE") { "trip_diary_prod_cache" } %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV.fetch("MYSQL_DATABASE_QUEUE") { "trip_diary_prod_queue" } %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV.fetch("MYSQL_DATABASE_CABLE") { "trip_diary_prod_cable" } %>
    migrations_paths: db/cable_migrate
